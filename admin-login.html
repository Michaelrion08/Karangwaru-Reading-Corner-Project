<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Karangwaru Reading Corner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="brand">
    <img src="IMG/Logo Krw Reading Corner Fix.png" alt="Logo">
    KARANGWARU READING CORNER
  </div>
  <nav>
    <a href="index.html">Beranda</a>
    <a href="tentang.html">Tentang</a>
    <a href="katalog.html">Katalog</a>
    <a href="peminjaman.html">Peminjaman</a>
    <a href="profil.html">Profil</a>
    <a href="panduan.html">Panduan</a>
  </nav>
</header>

<section class="page-section">
  <div class="card-white center-card-wrap">
    <h2 style="text-align:center;">Login Admin</h2>
    <div class="form-group">
      <label>Username</label>
      <input id="username" placeholder="Username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Password">
    </div>
    <div class="form-group">
      <label id="captchaLabel">Verifikasi</label>
      <input id="captchaAnswer" placeholder="Jawab di sini">
    </div>
    <button class="btn secondary" onclick="adminLogin()">Login</button>
    <p class="form-msg" id="msg"></p>
  </div>
</section>

<footer class="site-footer">© Copyright 2026 - Karangwaru RW04 - KKN Universitas Sanata Dharma</footer>

<script src="config.js"></script>
<script>
const a = Math.floor(Math.random() * 10) + 1;
const b = Math.floor(Math.random() * 10) + 1;
document.getElementById("captchaLabel").textContent = `Verifikasi: Berapa hasil dari ${a} + ${b} ?`;

function adminLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const jawaban = parseInt(document.getElementById("captchaAnswer").value.trim(), 10);
  const msg = document.getElementById("msg");

  if (jawaban !== a + b) {
    msg.textContent = "Jawaban verifikasi salah";
    msg.className = "form-msg error";
    return;
  }
  callAPI("adminLogin", { username, password }).then(r => {
    if (!r.ok) { msg.textContent = r.message; msg.className = "form-msg error"; return; }
    setAdminSession(r.profile);
    msg.textContent = "Berhasil masuk sebagai admin";
    msg.className = "form-msg success";
    setTimeout(() => location.href = "admin.html", 700);
  });
}
</script>
</body>
</html>
