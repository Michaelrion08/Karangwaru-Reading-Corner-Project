<!DOCTYPE html>
<html lang="id">
<head>

<link rel="stylesheet" href="style.css">
</head>

<header class="navbar">

  </div>
  <nav>
    <a href="index.html">Beranda</a>
    <a href="tentang.html">Tentang</a>
    <a href="katalog.html">Katalog</a>
    <a href="peminjaman.html">Peminjaman</a>
    <a href="profil.html">Profil</a>
    <a href="panduan.html">Panduan</a>
  </nav>
</header>

<section class="page-section">
  <div class="card-white" style="max-width:420px; margin:0 auto; text-align:center;">
    <div class="profile-avatar"><img src="https://api.iconify.design/twemoji:otter.svg" alt="Avatar"></div>
    <div class="profile-name" id="adminName"></div>

<footer class="site-footer">© Copyright 2026 - Karangwaru RW04 - KKN Universitas Sanata Dharma</footer>

<script src="config.js"></script>
<script>
const admin = getAdminSession();
if (!admin) {
  location.href = "admin-login.html";
} else {
  document.getElementById("adminName").textContent = admin.nama;
  document.getElementById("adminId").textContent = `ID : ${admin.id} · RT 54 Karangwaru`;
}
function keluarAdmin() {
  clearAdminSession();
  location.href = "index.html";
}
</script>
